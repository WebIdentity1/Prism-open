<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 160" fill="none">
  <defs>
    <linearGradient id="prism-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7B61FF"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>
  <!-- Rotated rounded square -->
  <g transform="translate(80,80)">
    <rect x="-48" y="-48" width="96" height="96" rx="20" fill="url(#prism-grad)" transform="rotate(45)"/>
    <rect x="-16" y="-16" width="32" height="32" rx="6" fill="white" fill-opacity="0.3"/>
  </g>
  <!-- "Prism" text -->
  <text x="160" y="102" font-family="'Outfit', 'Inter', system-ui, sans-serif" font-size="72" font-weight="500" fill="white" letter-spacing="-1">Prism</text>
</svg>
